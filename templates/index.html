<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaji</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- ბმული static/style.css-ზე -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <div class="logo">Pasaji</div>
        <ul class="nav-links">
            <li><a href="#" class="active">მთავარი</a></li>
            <li><a href="#products">კოლექცია</a></li>
            <li><a href="#">კონტაქტი</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="hero-tag">ახალი კოლექცია</span>
            <h1>PASAJI <em>N4</em></h1>
            <p class="hero-sub">ექსკლუზიური სტილი და ხარისხი</p>
            <a href="#products" class="cta-btn">კოლექციის ნახვა</a>
        </div>
    </section>

    <section class="section" id="products">
        <div class="section-header">
            <span class="section-tag">ექსკლუზივი</span>
            <h2 class="section-title">პროდუქცია</h2>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active">ყველა</button>
            <button class="filter-btn">მაისურები</button>
            <button class="filter-btn">შარვლები</button>
        </div>

        <div class="products-grid">
            {% for product in products %}
            <div class="product-card">
                <div class="product-img">
                    <span class="product-badge {{ product.badge_class }}">{{ product.badge }}</span>
                    <img src="{{ product.image }}" alt="{{ product.title }}">
                </div>
                <div class="product-info">
                    <div class="product-cat">{{ product.category }}</div>
                    <div class="product-name">{{ product.title }}</div>
                    <div class="product-detail">ზომები: {{ product.sizes }}</div>
                    <div class="product-price">{{ product.price }} ₾</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

</body>
</html>
