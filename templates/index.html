<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#A07840;
  --gold-light:#C49A5A;
  --dark:#1A1712;
  --dark2:#F7F4EF;
  --dark3:#EDE9E2;
  --cream:#1A1712;
  --cream2:#3D3830;
  --text-muted:#8A8070;
  --bg:#FAFAF8;
  --bg2:#F2EFE9;
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
}
body{background:var(--bg);color:var(--dark);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(250,250,248,0.97);
  border-bottom:1px solid rgba(160,120,64,0.15);
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
  backdrop-filter:blur(8px);
}
.logo{
  font-family:var(--serif);
  font-size:22px;
  font-weight:300;
  letter-spacing:0.15em;
  color:var(--gold);
  text-transform:uppercase;
}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{
  font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text-muted);text-decoration:none;
  transition:color 0.2s;cursor:pointer;
}
.nav-links a:hover,.nav-links a.active{color:var(--dark)}

.hero{
  min-height:85vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:var(--bg2);
  text-align:center;padding:0;
}
.hero-photo{
  width:100%;height:85vh;
  object-fit:cover;object-position:center 20%;
  display:block;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.08) 0%,
    rgba(0,0,0,0.12) 35%,
    rgba(0,0,0,0.72) 75%,
    rgba(0,0,0,0.88) 100%
  );
}
.hero-content{
  position:absolute;bottom:4rem;left:0;right:0;
  text-align:center;
  padding:0 1rem;
}
.hero-tag{
  font-size:11px;letter-spacing:0.45em;text-transform:uppercase;
  color:#D4A96A;margin-bottom:1rem;display:block;
  font-weight:500;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.hero h1{
  font-family:var(--serif);
  font-size:clamp(38px,5.5vw,72px);
  font-weight:400;
  line-height:1.1;
  letter-spacing:0.04em;
  color:#FFFFFF;
  margin-bottom:0.75rem;
  text-shadow:0 2px 16px rgba(0,0,0,0.55);
}
.hero h1 em{
  font-style:italic;
  color:#D4A96A;
  text-shadow:0 2px 16px rgba(0,0,0,0.55);
}
.hero-sub{
  font-size:12px;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(255,255,255,0.88);margin-bottom:2.2rem;
  text-shadow:0 1px 6px rgba(0,0,0,0.6);
  font-weight:400;
}
.cta-btn{
  display:inline-block;
  padding:14px 44px;
  border:1.5px solid rgba(255,255,255,0.85);
  color:#fff;
  font-family:var(--sans);
  font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(4px);
}
.cta-btn:hover{background:#fff;color:var(--dark);border-color:#fff;}


.section{padding:6rem 2rem;max-width:1200px;margin:0 auto}
.section-header{text-align:center;margin-bottom:4rem}
.section-tag{
  font-size:10px;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1rem;display:block;
}
.section-title{
  font-family:var(--serif);
  font-size:clamp(32px,4vw,48px);
  font-weight:300;color:var(--dark);
  line-height:1.2;
}

.filter-bar{
  display:flex;justify-content:center;gap:0;
  margin-bottom:3rem;
  border:1px solid rgba(160,120,64,0.3);
  width:fit-content;margin-left:auto;margin-right:auto;
}
.filter-btn{
  padding:10px 28px;
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  background:transparent;color:var(--text-muted);
  border:none;cursor:pointer;transition:all 0.2s;
  font-family:var(--sans);
}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:#fff}

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.5px;
  background:rgba(160,120,64,0.12);
}
.product-card{
  background:var(--bg);
  cursor:pointer;
  transition:transform 0.3s;
  position:relative;overflow:hidden;
}
.product-card:hover{transform:scale(1.01);z-index:2}
.product-img{
  aspect-ratio:3/4;
  background:var(--dark3);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.product-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  color:rgba(160,120,64,0.4);
}
.product-placeholder svg{width:48px;height:48px;opacity:0.4}
.upload-hint{
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(160,120,64,0.4);
}
.product-badge{
  position:absolute;top:16px;left:16px;
  padding:4px 12px;
  font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
  z-index:2;
}
.product-badge.badge-bestseller{background:#A07840;color:#fff;}
.product-badge.badge-new{background:#2A2A2A;color:#fff;}
.product-price{
  font-size:15px;font-weight:500;color:var(--dark);margin-top:6px;letter-spacing:0.02em;
}
.product-orig-price{
  font-size:12px;color:#aaa;text-decoration:line-through;margin-top:2px;
}
.modal-price-wrap{display:flex;align-items:center;gap:12px;}
.modal-price{font-size:22px;font-weight:500;color:var(--dark);letter-spacing:0.02em;}
.modal-orig-price{font-size:15px;color:#bbb;text-decoration:line-through;}
.product-info{padding:1.25rem;background:var(--bg);}
.product-cat{
  font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:6px;
}
.product-name{
  font-family:var(--serif);font-size:20px;font-weight:300;
  color:var(--dark);margin-bottom:4px;line-height:1.2;
}
.product-detail{
  font-size:12px;color:var(--text-muted);letter-spacing:0.05em;
}
.product-price{
  font-size:14px;font-weight:400;color:var(--dark);margin-top:6px;letter-spacing:0.05em;
}
.product-hover-info{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(250,250,248,0.95));
  padding:2rem 1.25rem 1.25rem;
  transform:translateY(100%);transition:transform 0.3s;
}
.product-card:hover .product-hover-info{transform:translateY(0)}
.contact-tag{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold);
}

.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,23,18,0.6);z-index:1000;
  align-items:center;justify-content:center;padding:2rem;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg);
  max-width:700px;width:100%;
  border:1px solid rgba(160,120,64,0.2);
  display:grid;grid-template-columns:1fr 1fr;
  max-height:90vh;overflow:hidden;
  position:relative;
}
.modal-img{
  background:var(--dark3);
  display:flex;align-items:center;justify-content:center;
  min-height:400px;
}
.modal-body{padding:2.5rem 2rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.5rem}
.modal-close
